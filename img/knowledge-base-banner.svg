<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 300" width="1800" height="300">
  <rect width="1800" height="300" fill="#1e222d"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2f3d" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1800" height="300" fill="url(#grid)"/>

  <!-- Connection lines between nodes (drawn first, behind nodes) -->
  <line x1="1300" y1="100" x2="1420" y2="150" stroke="#3a6bb5" stroke-width="1.5" opacity="0.35"/>
  <line x1="1420" y1="150" x2="1540" y2="90" stroke="#00a08a" stroke-width="1.5" opacity="0.35"/>
  <line x1="1420" y1="150" x2="1380" y2="230" stroke="#e0b515" stroke-width="1.5" opacity="0.35"/>
  <line x1="1540" y1="90" x2="1650" y2="160" stroke="#e64855" stroke-width="1.5" opacity="0.35"/>
  <line x1="1380" y1="230" x2="1520" y2="220" stroke="#3a6bb5" stroke-width="1.5" opacity="0.35"/>
  <line x1="1520" y1="220" x2="1650" y2="160" stroke="#00a08a" stroke-width="1.5" opacity="0.35"/>
  <line x1="1300" y1="100" x2="1240" y2="190" stroke="#e64855" stroke-width="1.5" opacity="0.35"/>
  <line x1="1240" y1="190" x2="1380" y2="230" stroke="#00a08a" stroke-width="1.5" opacity="0.35"/>
  <line x1="1540" y1="90" x2="1520" y2="220" stroke="#e0b515" stroke-width="1.5" opacity="0.25"/>
  <line x1="1650" y1="160" x2="1720" y2="240" stroke="#3a6bb5" stroke-width="1.5" opacity="0.3"/>

  <!-- Knowledge nodes -->
  <!-- Node 1: top-left cluster -->
  <circle cx="1300" cy="100" r="22" fill="#1e222d" stroke="#e64855" stroke-width="2" opacity="0.9"/>
  <rect x="1286" y="92" width="28" height="4" rx="1" fill="#e64855" opacity="0.7"/>
  <rect x="1286" y="100" width="20" height="3" rx="1" fill="#e64855" opacity="0.5"/>
  <rect x="1286" y="106" width="24" height="3" rx="1" fill="#e64855" opacity="0.5"/>

  <!-- Node 2: center -->
  <circle cx="1420" cy="150" r="28" fill="#1e222d" stroke="#3a6bb5" stroke-width="2.5" opacity="0.9"/>
  <rect x="1403" y="139" width="34" height="4" rx="1" fill="#3a6bb5" opacity="0.7"/>
  <rect x="1403" y="147" width="26" height="3" rx="1" fill="#3a6bb5" opacity="0.5"/>
  <rect x="1403" y="153" width="30" height="3" rx="1" fill="#3a6bb5" opacity="0.5"/>
  <rect x="1403" y="159" width="22" height="3" rx="1" fill="#3a6bb5" opacity="0.5"/>

  <!-- Node 3: top-right -->
  <circle cx="1540" cy="90" r="20" fill="#1e222d" stroke="#00a08a" stroke-width="2" opacity="0.9"/>
  <rect x="1527" y="83" width="26" height="4" rx="1" fill="#00a08a" opacity="0.7"/>
  <rect x="1527" y="90" width="18" height="3" rx="1" fill="#00a08a" opacity="0.5"/>
  <rect x="1527" y="96" width="22" height="3" rx="1" fill="#00a08a" opacity="0.5"/>

  <!-- Node 4: bottom-left -->
  <circle cx="1240" cy="190" r="18" fill="#1e222d" stroke="#e0b515" stroke-width="2" opacity="0.9"/>
  <rect x="1228" y="183" width="24" height="4" rx="1" fill="#e0b515" opacity="0.7"/>
  <rect x="1228" y="190" width="16" height="3" rx="1" fill="#e0b515" opacity="0.5"/>
  <rect x="1228" y="196" width="20" height="3" rx="1" fill="#e0b515" opacity="0.5"/>

  <!-- Node 5: bottom-center -->
  <circle cx="1380" cy="230" r="21" fill="#1e222d" stroke="#e64855" stroke-width="2" opacity="0.9"/>
  <rect x="1366" y="222" width="28" height="4" rx="1" fill="#e64855" opacity="0.7"/>
  <rect x="1366" y="229" width="20" height="3" rx="1" fill="#e64855" opacity="0.5"/>
  <rect x="1366" y="235" width="24" height="3" rx="1" fill="#e64855" opacity="0.5"/>

  <!-- Node 6: right -->
  <circle cx="1650" cy="160" r="24" fill="#1e222d" stroke="#00a08a" stroke-width="2" opacity="0.9"/>
  <rect x="1635" y="150" width="30" height="4" rx="1" fill="#00a08a" opacity="0.7"/>
  <rect x="1635" y="157" width="22" height="3" rx="1" fill="#00a08a" opacity="0.5"/>
  <rect x="1635" y="163" width="26" height="3" rx="1" fill="#00a08a" opacity="0.5"/>
  <rect x="1635" y="169" width="18" height="3" rx="1" fill="#00a08a" opacity="0.5"/>

  <!-- Node 7: bottom-right -->
  <circle cx="1520" cy="220" r="19" fill="#1e222d" stroke="#3a6bb5" stroke-width="2" opacity="0.9"/>
  <rect x="1507" y="213" width="26" height="4" rx="1" fill="#3a6bb5" opacity="0.7"/>
  <rect x="1507" y="220" width="18" height="3" rx="1" fill="#3a6bb5" opacity="0.5"/>
  <rect x="1507" y="226" width="22" height="3" rx="1" fill="#3a6bb5" opacity="0.5"/>

  <!-- Node 8: far bottom-right -->
  <circle cx="1720" cy="240" r="16" fill="#1e222d" stroke="#e0b515" stroke-width="1.5" opacity="0.9"/>
  <rect x="1709" y="234" width="22" height="3" rx="1" fill="#e0b515" opacity="0.7"/>
  <rect x="1709" y="240" width="16" height="3" rx="1" fill="#e0b515" opacity="0.5"/>
  <rect x="1709" y="245" width="18" height="3" rx="1" fill="#e0b515" opacity="0.5"/>

  <!-- Glow effects on key nodes -->
  <circle cx="1420" cy="150" r="40" fill="#3a6bb5" opacity="0.06"/>
  <circle cx="1650" cy="160" r="35" fill="#00a08a" opacity="0.05"/>
  <circle cx="1300" cy="100" r="32" fill="#e64855" opacity="0.05"/>

  <!-- Scattered ambient dots -->
  <circle cx="1170" cy="80" r="2" fill="#e64855" opacity="0.15"/>
  <circle cx="1190" cy="260" r="2.5" fill="#3a6bb5" opacity="0.12"/>
  <circle cx="1760" cy="100" r="2" fill="#00a08a" opacity="0.15"/>
  <circle cx="1680" cy="270" r="1.8" fill="#e0b515" opacity="0.12"/>
  <circle cx="1460" cy="60" r="2.2" fill="#3a6bb5" opacity="0.1"/>
  <circle cx="1350" cy="270" r="1.5" fill="#00a08a" opacity="0.12"/>

  <!-- Title text -->
  <text x="60" y="110" font-family="sans-serif" font-size="46" font-weight="bold">
    <tspan fill="#e64855">Knowledge</tspan>
    <tspan fill="#f0f2f5"> Base</tspan>
  </text>
  <text x="60" y="155" font-family="sans-serif" font-size="19" fill="#c8cdd7">Community-Contributed Optimization Techniques</text>
  <text x="60" y="183" font-family="sans-serif" font-size="15" fill="#8c91a0">Search, learn, contribute back</text>

  <!-- Tags -->
  <rect x="60" y="210" width="108" height="24" rx="10" fill="#373c4b"/>
  <text x="114" y="226" font-family="sans-serif" font-size="12" fill="#b4b9c3" text-anchor="middle">Techniques</text>
  <rect x="178" y="210" width="120" height="24" rx="10" fill="#373c4b"/>
  <text x="238" y="226" font-family="sans-serif" font-size="12" fill="#b4b9c3" text-anchor="middle">Experiments</text>
  <rect x="308" y="210" width="130" height="24" rx="10" fill="#373c4b"/>
  <text x="373" y="226" font-family="sans-serif" font-size="12" fill="#b4b9c3" text-anchor="middle">Lessons Learned</text>

  <!-- Bottom tagline -->
  <text x="1760" y="285" font-family="sans-serif" font-size="12" fill="#555a68" text-anchor="end">Shared Knowledge for the Algorithm Engineering Cycle</text>
</svg>
